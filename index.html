<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Velevin</title>
    <meta name="author" content="G. Velevin">
    <meta name="description" content="The official website of G. Velevin, author of Sundry Mirages and Lingeringer.">
    <meta name="keywords"
        content="G. Velevin, Sundry Mirages, Mulandó Ábrándok, Lingeringer, Lézengélő, literature, writing, author">
    <script>document.documentElement.classList.add('js');</script>

    <style>
        :root {
            color-scheme: light;
            --paper: #fff;
            --x: 50%;
            --y: 50%;
            --shift-speed: 12000ms;
            --field-speed: 42000ms;
            --ink: #171717;
            --muted: #6e6e69;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background-color: var(--paper);
            transition: background-color var(--shift-speed) cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        html::before {
            content: "";
            position: fixed;
            top: var(--y);
            left: var(--x);
            z-index: 0;
            width: clamp(620px, 108vw, 1450px);
            height: clamp(620px, 108vw, 1450px);
            background: radial-gradient(circle,
                    rgba(255, 255, 255, 0.3) 0,
                    rgba(255, 255, 255, 0.11) 45%,
                    rgba(255, 255, 255, 0) 80%);
            transform: translate(-50%, -50%);
            transition:
                top var(--field-speed) cubic-bezier(0.42, 0, 0.58, 1),
                left var(--field-speed) cubic-bezier(0.42, 0, 0.58, 1);
            pointer-events: none;
        }

        body {
            min-height: 100vh;
            margin: 0;
            position: relative;
            z-index: 1;
            color: var(--ink);
            background: transparent;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
                "Segoe UI", sans-serif;
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
            white-space: nowrap;
            border: 0;
        }

        main {
            width: min(100% - 40px, 880px);
            margin-inline: auto;
        }

        .js:not(.gallery-open) body main {
            display: grid;
            min-height: 100vh;
            min-height: 100svh;
            place-items: center;
        }

        .main-art {
            width: min(74vw, 400px);
            margin: clamp(6px, 1.5vh, 14px) auto clamp(16px, 3vw, 28px);
        }

        .js:not(.gallery-open) .main-art {
            margin: 0;
            opacity: 0;
            transition: opacity 5000ms cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        .js:not(.gallery-open) .main-art.is-visible {
            opacity: 1;
        }

        .gallery-open body main {
            padding-top: clamp(20px, 4vw, 48px);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(6px, 1vw, 12px);
            opacity: 1;
        }

        .js .gallery .swap {
            opacity: 0;
            transform: translateY(7px);
            transition:
                opacity var(--reveal-duration, 1000ms) linear var(--reveal-delay, 0ms),
                transform var(--reveal-duration, 1000ms) ease var(--reveal-delay, 0ms);
        }

        .js .gallery.is-visible .swap {
            opacity: 1;
            transform: none;
        }

        .js .gallery .swap:nth-child(1) {
            --reveal-duration: 9000ms;
            --reveal-delay: 1000ms;
        }

        .js .gallery .swap:nth-child(2) {
            --reveal-duration: 9000ms;
            --reveal-delay: 10000ms;
        }

        .js .gallery .swap:nth-child(3) {
            --reveal-duration: 9000ms;
            --reveal-delay: 19000ms;
        }

        .js .gallery .swap:nth-child(4) {
            --reveal-duration: 9000ms;
            --reveal-delay: 28000ms;
        }

        .js .gallery .swap:nth-child(5) {
            --reveal-duration: 9000ms;
            --reveal-delay: 37000ms;
        }

        .js .gallery .swap:nth-child(6) {
            --reveal-duration: 9000ms;
            --reveal-delay: 46000ms;
        }

        .js .gallery .swap:nth-child(7) {
            --reveal-duration: 9000ms;
            --reveal-delay: 55000ms;
        }

        .js .gallery .swap:nth-child(8) {
            --reveal-duration: 9000ms;
            --reveal-delay: 64000ms;
        }

        .js footer.is-visible {
            opacity: 1;
        }

        .js:not(.gallery-open) .gallery,
        .js:not(.gallery-open) footer {
            display: none;
        }

        .js footer {
            opacity: 0;
            visibility: hidden;
        }

        .js footer.is-visible {
            visibility: visible;
        }

        .swap {
            position: relative;
            display: block;
            width: 100%;
            padding: 0;
            overflow: hidden;
            color: inherit;
            background: transparent;
            border: 0;
            border-radius: 1px;
            cursor: pointer;
            touch-action: pan-y pinch-zoom;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        .gallery .swap {
            --title-space: 1.45rem;
            padding-top: var(--title-space);
            background: transparent;
            box-shadow: none;
        }

        .gallery .swap::after {
            content: attr(data-title);
            position: absolute;
            top: 0.38rem;
            right: 0;
            left: 0;
            z-index: 1;
            color: #171717;
            font-size: clamp(0.52rem, 0.8vw, 0.64rem);
            font-weight: 400;
            line-height: 1.2;
            letter-spacing: 0.035em;
            text-align: center;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 8500ms ease;
            pointer-events: none;
        }

        .gallery .swap:focus-visible::after {
            opacity: 1;
            transition-duration: 2600ms;
            transition-delay: 3000ms;
        }

        .gallery .swap.is-title-armed::after {
            opacity: 1;
            transition-duration: 2600ms;
            transition-delay: 3000ms;
        }

        .swap img {
            display: block;
            width: 100%;
            height: auto;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .swap .front {
            position: absolute;
            inset: 0;
            transition: none;
        }

        .gallery .swap .front {
            top: var(--title-space);
        }

        .gallery .swap img {
            background: #fff;
            box-shadow: 0 0 0 1px rgb(0 0 0 / 4%);
        }

        .swap.is-revealed .front {
            opacity: 0;
        }

        /* Transparent covers switch directly so they never show through each other. */
        .main-art .swap>img:first-child {
            visibility: hidden;
        }

        .main-art .swap .front {
            transition: none;
        }

        .main-art .swap.is-revealed>img:first-child {
            visibility: visible;
        }

        .main-art .swap.is-revealed .front {
            visibility: hidden;
        }

        .swap:focus-visible {
            outline: 2px solid var(--ink);
            outline-offset: 4px;
        }

        footer {
            width: min(100% - 40px, 680px);
            margin: clamp(24px, 4vw, 44px) auto 20px;
            color: var(--muted);
            font-size: 0.72rem;
            line-height: 1.55;
            letter-spacing: 0.025em;
            text-align: center;
            opacity: 1;
            transition:
                color var(--shift-speed) cubic-bezier(0.22, 0.61, 0.36, 1),
                opacity 4000ms ease;
        }

        footer p {
            margin: 0;
        }

        @media (max-width: 899px),
        (pointer: coarse) and (max-width: 1000px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (hover: hover) {
            .swap:hover .front {
                opacity: 0;
            }

            .gallery .swap:hover::after {
                opacity: 1;
                transition-duration: 2600ms;
                transition-delay: 3000ms;
            }

            .main-art .swap:hover>img:first-child {
                visibility: visible;
            }

            .main-art .swap:hover .front {
                visibility: hidden;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .swap .front {
                transition: none;
            }

            .gallery .swap::after {
                transition: none;
            }

            html {
                transition: none;
            }

            html::before {
                transition: none;
            }

            .main-art,
            .js .gallery,
            .js .gallery .swap,
            .js footer {
                transition: none;
            }
        }
    </style>
</head>

    <script>
        (() => {
            const swaps = document.querySelectorAll('.swap');
            const reducedMotion = window.matchMedia &&
                window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const hoverCapable = !window.matchMedia ||
                window.matchMedia('(hover: hover)').matches;
            const mainSwap = document.getElementById('main-swap');
            const mainArt = document.querySelector('.main-art');
            const gallery = document.getElementById('gallery');
            const footer = document.querySelector('footer');
            const nextFrame = window.requestAnimationFrame ||
                ((callback) => setTimeout(callback, 16));
            let deepen = () => { };
            let galleryOpening = false;
            const suppressedClicks = new WeakSet();
            const clickTimers = new WeakMap();
            const recentDirectInput = new WeakMap();

            if (!mainSwap || !mainArt || !gallery || !footer) {
                document.documentElement.classList.remove('js');
                return;
            }

            const galleryImages = gallery.querySelectorAll('img');
            const mainImages = mainArt.querySelectorAll('img');
            const readyCallbacks = [];
            let preloadStarted = false;
            let galleryReady = false;

            const markGalleryReady = () => {
                galleryReady = true;

                while (readyCallbacks.length) {
                    readyCallbacks.shift()();
                }
            };

            const preloadGallery = () => {
                if (preloadStarted) return;
                preloadStarted = true;

                if (!galleryImages.length) {
                    markGalleryReady();
                    return;
                }

                let remaining = galleryImages.length;

                for (let index = 0; index < galleryImages.length; index += 1) {
                    const image = galleryImages[index];
                    let settled = false;

                    const finish = () => {
                        if (settled) return;
                        settled = true;
                        remaining -= 1;
                        if (remaining === 0) markGalleryReady();
                    };

                    const decode = () => {
                        image.removeEventListener('load', decode, false);
                        image.removeEventListener('error', finish, false);

                        if (image.decode && image.naturalWidth) {
                            try {
                                image.decode().then(finish, finish);
                            } catch (error) {
                                finish();
                            }
                        } else {
                            finish();
                        }
                    };

                    image.loading = 'eager';
                    image.removeAttribute('loading');
                    image.addEventListener('load', decode, false);
                    image.addEventListener('error', finish, false);

                    if (image.complete) nextFrame(image.naturalWidth ? decode : finish);

                    setTimeout(finish, 15000);
                }
            };

            const whenGalleryReady = (callback) => {
                if (galleryReady) callback();
                else readyCallbacks.push(callback);
            };

            const revealMainAndPreload = () => nextFrame(() => nextFrame(() => {
                mainArt.classList.add('is-visible');
                preloadGallery();
            }));
            let pendingMainImages = 0;

            for (let index = 0; index < mainImages.length; index += 1) {
                const image = mainImages[index];
                if (image.complete) continue;
                pendingMainImages += 1;

                let settled = false;
                const finish = () => {
                    if (settled) return;
                    settled = true;
                    pendingMainImages -= 1;
                    if (pendingMainImages === 0) revealMainAndPreload();
                };

                image.addEventListener('load', finish, false);
                image.addEventListener('error', finish, false);
            }

            if (pendingMainImages === 0) revealMainAndPreload();

            if (!reducedMotion) {
                const root = document.documentElement;
                let left = 50;
                let top = 0;
                let atmosphere = 0;
                let attention = 0;
                let scheduled = false;
                let lastInput = 0;
                let firstInput = 0;
                let emergenceTimer = 0;
                let idle = true;

                const preferredHue = (position) => {
                    const turn = ((position % 1) + 1) % 1;
                    return 190 + turn * 75;
                };

                const emergence = () => {
                    if (!firstInput) return 0;

                    const elapsed = Date.now() - firstInput;
                    return Math.min(1, Math.pow(elapsed / 10000, 1.7));
                };

                const beginEmergence = () => {
                    if (firstInput) return;

                    firstInput = Date.now();
                    emergenceTimer = setInterval(() => {
                        paint();

                        if (emergence() >= 1) {
                            clearInterval(emergenceTimer);
                            emergenceTimer = 0;
                        }
                    }, 1000);
                };

                const paint = () => {
                    if (scheduled) return;
                    scheduled = true;

                    nextFrame(() => {
                        const scrollRange = document.documentElement.scrollHeight - innerHeight;
                        const scroll = scrollRange > 0 ? scrollY / scrollRange : 0;
                        const maturity = emergence();
                        const depth = Math.max(0, Math.min(1, atmosphere)) * maturity;
                        const hue = Math.round(preferredHue(left / 100 + scroll * 0.18));
                        const paperSaturation = Math.round(maturity * (4 + atmosphere * 22));
                        const paperLightness = 100 - maturity * (2 + atmosphere * 29);
                        const mutedLightness = 38 - depth * 20;
                        const fieldTop = 14 + top * 0.72;
                        const colorSpeed = idle
                            ? 34000 - maturity * 14000
                            : 32000 - maturity * 18000;
                        const fieldSpeed = idle
                            ? 52000 - maturity * 12000
                            : 50000 - maturity * 16000;

                        root.style.setProperty('--shift-speed', `${Math.round(colorSpeed)}ms`);
                        root.style.setProperty('--field-speed', `${Math.round(fieldSpeed)}ms`);
                        root.style.setProperty('--x', `${left}%`);
                        root.style.setProperty('--y', `${fieldTop}%`);
                        root.style.setProperty('--paper', `hsl(${hue}, ${paperSaturation}%, ${paperLightness}%)`);
                        root.style.setProperty('--muted', `hsl(${hue}, 8%, ${mutedLightness}%)`);
                        scheduled = false;
                    });
                };

                const activate = (depth) => {
                    beginEmergence();
                    atmosphere = Math.max(attention, Math.min(1, depth));
                    lastInput = Date.now();
                    idle = false;
                    paint();
                };

                const followPoint = (clientX, clientY) => {
                    const horizontal = Math.max(0, Math.min(1, clientX / Math.max(innerWidth, 1)));
                    top = Math.max(0, Math.min(100, clientY / Math.max(innerHeight, 1) * 100));
                    left = 14 + horizontal * 72;
                    activate(0.18 + top / 100 * 0.82);
                };

                const followPointer = (event) => followPoint(event.clientX, event.clientY);

                const followScroll = () => {
                    const range = document.documentElement.scrollHeight - innerHeight;
                    const progress = range > 0 ? scrollY / range : 0;
                    top = progress * 100;
                    activate(Math.max(0.12, progress));
                };

                deepen = () => {
                    attention = Math.min(1, attention + 0.12);
                    activate(Math.max(0.24, attention));
                };

                if ('PointerEvent' in window) {
                    addEventListener('pointermove', followPointer, false);
                    addEventListener('pointerdown', followPointer, false);
                } else {
                    addEventListener('mousemove', followPointer, false);
                    addEventListener('mousedown', followPointer, false);
                    addEventListener('touchstart', (event) => {
                        if (event.touches && event.touches[0]) {
                            followPoint(event.touches[0].clientX, event.touches[0].clientY);
                        }
                    }, false);
                }

                addEventListener('scroll', followScroll, false);

                setInterval(() => {
                    if (!firstInput || Date.now() - lastInput < 15000) return;
                    idle = true;
                    atmosphere = 0;
                    left = 20 + Math.random() * 60;
                    top = 15 + Math.random() * 70;
                    paint();
                }, 22000);
            }

            const setReveal = (item, reveal) => {
                item.classList.toggle('is-revealed', reveal);

                if (item !== mainSwap) {
                    item.setAttribute('aria-pressed', String(reveal));
                }

                if (reveal) deepen();
            };

            const armTouchTitle = (item) => {
                if (item !== mainSwap) item.classList.add('is-title-armed');
            };

            const disarmTouchTitle = (item) => {
                if (item !== mainSwap) item.classList.remove('is-title-armed');
            };

            const suppressNextClick = (item) => {
                suppressedClicks.add(item);
                clearTimeout(clickTimers.get(item));
                clickTimers.set(item, setTimeout(() => {
                    suppressedClicks.delete(item);
                    clickTimers.delete(item);
                }, 500));
            };

            const installDirectGestures = (item) => {
                let swipeStart = null;

                const beginSwipe = (id, clientX, clientY) => {
                    recentDirectInput.set(item, Date.now());
                    armTouchTitle(item);
                    swipeStart = {
                        id,
                        x: clientX,
                        y: clientY,
                        time: Date.now()
                    };
                };

                const moveSwipe = (id, clientX, clientY) => {
                    if (!swipeStart || swipeStart.id !== id) return;

                    if (Math.abs(clientX - swipeStart.x) > 12 || Math.abs(clientY - swipeStart.y) > 12) {
                        disarmTouchTitle(item);
                    }
                };

                const endSwipe = (id, clientX, clientY) => {
                    if (!swipeStart || swipeStart.id !== id) return;

                    const deltaX = clientX - swipeStart.x;
                    const deltaY = clientY - swipeStart.y;
                    const heldFor = Date.now() - swipeStart.time;
                    swipeStart = null;
                    disarmTouchTitle(item);

                    if (Math.abs(deltaX) >= 45 && Math.abs(deltaX) > Math.abs(deltaY) * 1.2) {
                        setReveal(item, deltaX < 0);
                        suppressNextClick(item);
                    } else if (heldFor >= 600) {
                        suppressNextClick(item);
                    }
                };

                const cancelSwipe = () => {
                    swipeStart = null;
                    disarmTouchTitle(item);
                };

                item.addEventListener('contextmenu', (event) => {
                    const directInputWasRecent = Date.now() - (recentDirectInput.get(item) || 0) < 2000;
                    if (event.pointerType === 'touch' || event.pointerType === 'pen' || directInputWasRecent) {
                        event.preventDefault();
                    }
                }, false);

                if ('PointerEvent' in window) {
                    item.addEventListener('pointerdown', (event) => {
                        if (event.pointerType !== 'mouse') {
                            beginSwipe(event.pointerId, event.clientX, event.clientY);
                        }
                    }, false);
                    item.addEventListener('pointerup', (event) => {
                        if (event.pointerType !== 'mouse') {
                            endSwipe(event.pointerId, event.clientX, event.clientY);
                        }
                    }, false);
                    item.addEventListener('pointermove', (event) => {
                        if (event.pointerType !== 'mouse') {
                            moveSwipe(event.pointerId, event.clientX, event.clientY);
                        }
                    }, false);
                    item.addEventListener('pointercancel', cancelSwipe, false);
                } else {
                    item.addEventListener('touchstart', (event) => {
                        if (event.touches && event.touches.length === 1) {
                            const touch = event.touches[0];
                            beginSwipe(0, touch.clientX, touch.clientY);
                        }
                    }, { passive: true });
                    item.addEventListener('touchend', (event) => {
                        if (event.changedTouches && event.changedTouches[0]) {
                            const touch = event.changedTouches[0];
                            endSwipe(0, touch.clientX, touch.clientY);
                        }
                    }, { passive: true });
                    item.addEventListener('touchmove', (event) => {
                        if (event.touches && event.touches[0]) {
                            const touch = event.touches[0];
                            moveSwipe(0, touch.clientX, touch.clientY);
                        }
                    }, { passive: true });
                    item.addEventListener('touchcancel', cancelSwipe, { passive: true });
                }
            };

            const openGallery = () => {
                if (galleryOpening) return;
                galleryOpening = true;
                mainSwap.setAttribute('aria-expanded', 'true');
                deepen();

                for (let index = 0; index < galleryImages.length; index += 1) {
                    galleryImages[index].loading = 'eager';
                }

                mainArt.hidden = true;
                document.documentElement.classList.add('gallery-open');
                preloadGallery();

                whenGalleryReady(() => {
                    const galleryItems = gallery.querySelectorAll('.swap');
                    const lastGalleryItem = galleryItems[galleryItems.length - 1];
                    let finished = false;

                    const finishGallery = (event) => {
                        if (finished || (event && event.propertyName !== 'opacity')) return;
                        finished = true;
                        if (lastGalleryItem) {
                            lastGalleryItem.removeEventListener('transitionend', finishGallery, false);
                        }
                        footer.classList.add('is-visible');

                        const firstGalleryItem = gallery.querySelector('.swap');
                        if (firstGalleryItem) {
                            try {
                                firstGalleryItem.focus({ preventScroll: true });
                            } catch (error) {
                                firstGalleryItem.focus();
                            }
                        }
                    };

                    if (lastGalleryItem && !reducedMotion) {
                        lastGalleryItem.addEventListener('transitionend', finishGallery, false);
                    }

                    nextFrame(() => nextFrame(() => {
                        gallery.classList.add('is-visible');
                        if (reducedMotion || !lastGalleryItem) finishGallery();
                    }));

                    setTimeout(finishGallery, reducedMotion ? 0 : 73500);
                });
            };

            for (let index = 0; index < swaps.length; index += 1) {
                const item = swaps[index];
                installDirectGestures(item);

                if (item === mainSwap) {
                    item.addEventListener('click', (event) => {
                        if (suppressedClicks.has(item)) {
                            event.preventDefault();
                            return;
                        }
                        openGallery();
                    });
                } else {
                    item.addEventListener('click', (event) => {
                        if (suppressedClicks.has(item)) {
                            event.preventDefault();
                            return;
                        }

                        const reveal = item.getAttribute('aria-pressed') !== 'true';
                        setReveal(item, reveal);
                    });
                }

                if (hoverCapable) {
                    item.addEventListener('mouseenter', deepen, false);
                }
            }
        })();
    </script>
</body>

</html>
